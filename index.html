<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Social Media Sentiment Analysis</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(
                -45deg,
                #667eea,
                #764ba2,
                #6a11cb,
                #2575fc
            );
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        textarea {
            resize: none;
            transition: 0.3s ease;
        }

        textarea:focus {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .predict-btn {
            transition: all 0.3s ease;
        }

        .predict-btn:hover {
            transform: translateY(-3px);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="glass-card rounded-5 p-5 text-white fade-in">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h1 class="fw-bold display-5">
                            📊 Social Media Sentiment Analysis
                        </h1>

                        <p class="text-light mt-2">
                            Analyze whether a post is
                            <span class="fw-bold text-success">
                                Positive
                            </span>
                            or
                            <span class="fw-bold text-danger">
                                Negative
                            </span>
                        </p>
                    </div>

                    <!-- Form -->
                    <form method="POST">

                        <div class="mb-4">

                            <textarea
                                name="text"
                                rows="6"
                                class="form-control rounded-4 p-4 shadow-sm border-0"
                                placeholder="Type or paste your social media text here..."
                                required>{{ text }}</textarea>

                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-light btn-lg px-5 py-3 rounded-pill fw-bold predict-btn">

                                🔍 Analyze Sentiment

                            </button>

                        </div>
                    </form>

                    <!-- Result Section -->
                    {% if result %}

                    <div class="mt-5 fade-in">

                        <div class="row g-4">

                            <!-- Sentiment Card -->
                            <div class="col-md-6">

                                <div class="bg-white rounded-4 p-4 shadow text-center h-100">

                                    <h4 class="text-dark fw-bold mb-3">
                                        Prediction
                                    </h4>

                                    {% if "Positive" in result %}
                                    <h2 class="text-success fw-bold">
                                        😊 {{ result }}
                                    </h2>
                                    {% else %}
                                    <h2 class="text-danger fw-bold">
                                        😞 {{ result }}
                                    </h2>
                                    {% endif %}

                                </div>

                            </div>

                            <!-- Confidence Card -->
                            <div class="col-md-6">

                                <div class="bg-white rounded-4 p-4 shadow text-center h-100">

                                    <h4 class="text-dark fw-bold mb-3">
                                        Confidence Score
                                    </h4>

                                    <h2 class="text-primary fw-bold">
                                        {{ confidence }}%
                                    </h2>

                                    <div class="progress mt-3" style="height: 12px;">

                                        <div
                                            class="progress-bar progress-bar-striped progress-bar-animated"
                                            style="width: {{ confidence }}%">
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</body>
</html>
